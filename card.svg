<svg viewBox="0 0 167 150" width="167" height="150" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" role="img" aria-labelledby="title desc">
  <title id="title">Laucs profile card</title>
  <desc id="desc">Compact profile/status card with CatCuppin color palette and light/dark mode support for good readability.</desc>

  <style>
    /* CatCuppin palette (light defaults) */
    :root{
      --bg: #fff8f5;        /* page background */
      --panel: #ffffff;     /* card panel */
      --border: rgba(107,76,59,0.08);
      --muted: #6B4C3B;     /* coffee brown - primary text in light */
      --accent: #E7B8A3;    /* soft cappuccino */
      --accent-2: #D67F59;  /* warmer highlight */
      --text: #2B2B2B;      /* main text */
      --muted-2: #8B6B5A;   /* secondary text */
      --chip-bg: rgba(107,76,59,0.06);
    }

    /* Dark mode overrides */
    @media (prefers-color-scheme: dark) {
      :root{
        --bg: #1e1e2e;      /* keep existing dark background as default for dark mode */
        --panel: #101016;
        --border: rgba(255,255,255,0.04);
        --muted: #E7D6D0;   /* light text */
        --accent: #D67F59;
        --accent-2: #FFB86B;
        --text: #F3ECE8;
        --muted-2: #C9B6AD;
        --chip-bg: rgba(255,255,255,0.03);
      }
    }

    svg { display: block; }

    .bg { fill: var(--bg); }
    .panel { fill: none; stroke: var(--border); stroke-width:0.5; }

    .header-name { fill: var(--accent-2); font-size:5px; font-weight:700; letter-spacing:0.5px; }
    .header-sub { fill: var(--muted-2); font-size:4px; }

    .section-title { fill: var(--muted-2); font-size:3px; font-weight:700; letter-spacing:0.6px; }
    .label { fill: var(--text); font-size:4px; font-weight:700; }
    .job { fill: var(--accent); font-size:3.5px; font-weight:600; }
    .chip { fill: var(--chip-bg); stroke-width:0.4; rx:1; ry:1 }
    .chip-text { font-size:3px; fill: var(--accent); text-anchor:middle }
    .chip-text-alt { font-size:3px; fill: var(--accent-2); text-anchor:middle }
    .stack-title { fill: var(--muted-2); font-size:3px; font-weight:700; letter-spacing:0.6px }
    .stack-text { font-size:3px; fill: var(--accent); text-anchor:middle }

    /* Ensure strokes are visible in both modes */
    .stroke-weak { stroke: var(--border); }
  </style>

  <!-- Background -->
  <rect class="bg" width="167" height="150" rx="0" ry="0"/>

  <!-- Header -->
  <text x="6" y="12" class="header-name">Laucs</text>
  <text x="6" y="19" class="header-sub">Wahoo!</text>

  <line x1="6" y1="23" x2="161" y2="23" class="stroke-weak" />

  <!-- Section title -->
  <text x="6" y="30" class="section-title">WHAT AM I DOING RIGHT NOW</text>

  <!-- Project box (panel) -->
  <rect x="6" y="33" width="155" height="108" class="panel" rx="0" ry="0" />

  <!-- Project / items -->
  <text x="10" y="41" class="label">LUI</text>

  <text x="10" y="49" class="job">AI Chatbot</text>
  <!-- chips row 1 -->
  <rect x="10" y="51" width="12" height="6" class="chip stroke-weak" fill="var(--chip-bg)"/>
  <text x="16" y="55.5" class="chip-text">C++</text>

  <rect x="24" y="51" width="16" height="6" class="chip stroke-weak" fill="var(--chip-bg)"/>
  <text x="32" y="55.5" class="chip-text-alt">python</text>

  <text x="10" y="65" class="job" style="fill:var(--accent-2)">Website</text>
  <!-- chips row 2 -->
  <rect x="10" y="67" width="12" height="6" class="chip stroke-weak"/>
  <text x="16" y="71.5" class="chip-text">react</text>
  <rect x="24" y="67" width="10" height="6" class="chip stroke-weak"/>
  <text x="29" y="71.5" class="chip-text">css</text>
  <rect x="36" y="67" width="8" height="6" class="chip stroke-weak"/>
  <text x="40" y="71.5" class="chip-text">js</text>

  <text x="10" y="81" class="job" style="fill:var(--accent)">Operating System</text>
  <rect x="10" y="83" width="10" height="6" class="chip stroke-weak"/>
  <text x="15" y="87.5" class="chip-text">rust</text>

  <!-- Stack title -->
  <text x="10" y="100" class="section-title">STACK</text>

  <!-- Stack chips -->
  <rect x="10" y="103" width="8" height="6" class="chip stroke-weak"/>
  <text x="14" y="107.5" class="stack-text">js</text>

  <rect x="20" y="103" width="10" height="6" class="chip stroke-weak"/>
  <text x="25" y="107.5" class="stack-text">css</text>

  <rect x="32" y="103" width="12" height="6" class="chip stroke-weak"/>
  <text x="38" y="107.5" class="stack-text">html</text>

  <rect x="46" y="103" width="14" height="6" class="chip stroke-weak"/>
  <text x="53" y="107.5" class="stack-text">react</text>

  <rect x="62" y="103" width="16" height="6" class="chip stroke-weak"/>
  <text x="70" y="107.5" class="chip-text-alt">python</text>

  <rect x="80" y="103" width="8" height="6" class="chip stroke-weak"/>
  <text x="84" y="107.5" class="stack-text">C</text>

  <rect x="90" y="103" width="10" height="6" class="chip stroke-weak"/>
  <text x="95" y="107.5" class="stack-text">rust</text>

  <rect x="102" y="103" width="8" height="6" class="chip stroke-weak"/>
  <text x="106" y="107.5" class="stack-text">lua</text>

  <rect x="10" y="111" width="20" height="6" class="chip stroke-weak"/>
  <text x="20" y="115.5" class="chip-text-alt">photopea</text>

  <rect x="32" y="111" width="22" height="6" class="chip stroke-weak"/>
  <text x="43" y="115.5" class="chip-text">vscodium</text>

  <rect x="56" y="111" width="18" height="6" class="chip stroke-weak"/>
  <text x="65" y="115.5" class="chip-text-alt">blender</text>

</svg>
